<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchestr Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Task Manager</p>
        <h1>Контроль задач в одном окне</h1>
        <p class="subtitle">Авторизация, управление задачами, фильтры и пагинация.</p>
        <p class="deploy-badge">Автодеплой на VPS: активен</p>
      </header>

      <section class="card auth-card" id="authCard">
        <h2>Вход / Регистрация</h2>
        <form id="authForm" class="form-grid">
          <label>
            Email
            <input type="email" id="email" placeholder="you@example.com" required />
          </label>
          <label>
            Пароль
            <input type="password" id="password" placeholder="Минимум 8 символов" minlength="8" required />
          </label>
          <div class="actions-row">
            <button type="button" id="registerBtn" class="btn btn-ghost">Регистрация</button>
            <button type="button" id="loginBtn" class="btn btn-primary">Войти</button>
          </div>
        </form>
      </section>

      <section class="card profile-card hidden" id="profileCard">
        <div>
          <h2>Профиль</h2>
          <p id="profileInfo">Не авторизован</p>
        </div>
        <button id="logoutBtn" class="btn btn-danger">Выйти</button>
      </section>

      <section class="card tasks-card hidden" id="tasksCard">
        <div class="tasks-head">
          <h2>Задачи</h2>
          <button id="refreshBtn" class="btn btn-ghost">Обновить</button>
        </div>

        <form id="createTaskForm" class="form-grid">
          <label>
            Название
            <input id="taskTitle" type="text" placeholder="Новая задача" required />
          </label>
          <label>
            Описание
            <input id="taskDescription" type="text" placeholder="Краткое описание" />
          </label>
          <label>
            Статус
            <select id="taskStatus">
              <option value="todo">todo</option>
              <option value="in_progress">in_progress</option>
              <option value="done">done</option>
            </select>
          </label>
          <button type="submit" class="btn btn-primary">Создать задачу</button>
        </form>

        <div class="filters">
          <input id="searchInput" type="text" placeholder="Поиск по названию/описанию" />
          <select id="statusFilter">
            <option value="">Все статусы</option>
            <option value="todo">todo</option>
            <option value="in_progress">in_progress</option>
            <option value="done">done</option>
          </select>
          <select id="limitFilter">
            <option value="5">5 на страницу</option>
            <option value="10" selected>10 на страницу</option>
            <option value="20">20 на страницу</option>
          </select>
          <button id="applyFiltersBtn" class="btn btn-ghost" type="button">Применить</button>
        </div>

        <div id="tasksList" class="tasks-list"></div>

        <div class="pagination">
          <button id="prevPageBtn" class="btn btn-ghost" type="button">Назад</button>
          <p id="pageInfo">Страница 1</p>
          <button id="nextPageBtn" class="btn btn-ghost" type="button">Вперед</button>
        </div>
      </section>

      <div id="toast" class="toast"></div>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
