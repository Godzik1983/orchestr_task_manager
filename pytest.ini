[pytest]
# Ограничиваем область поиска только каталогом тестов.
testpaths = tests
# Исключаем служебные и системные каталоги из рекурсивного обхода.
norecursedirs = .git .venv venv .pytest_cache pytest-cache-files-* __pycache__
# Отключаем cacheprovider, чтобы избежать ошибок доступа в текущем окружении.
addopts = -p no:cacheprovider
