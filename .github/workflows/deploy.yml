name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image name
        id: image_name
        run: |
          echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image_name.outputs.value }}:latest
            ${{ steps.image_name.outputs.value }}:${{ github.sha }}

      - name: Export image ref
        id: image_ref
        run: |
          echo "value=${{ steps.image_name.outputs.value }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy_to_vps:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            mkdir -p ~/orchestr_task_manager
            cd ~/orchestr_task_manager

            cat > docker-compose.yml <<'EOF'
            version: "3.9"
            services:
              app:
                image: ${IMAGE}
                container_name: orchestr_task_manager
                restart: unless-stopped
                ports:
                  - "${APP_PORT}:8000"
                environment:
                  AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
                  TASKS_DB_PATH: /app/data/tasks.db
                volumes:
                  - task_data:/app/data
            volumes:
              task_data:
            EOF

            cat > .env <<EOF
            IMAGE=${{ needs.build_and_push.outputs.image_ref }}
            APP_PORT=${{ secrets.APP_PORT || '8080' }}
            AUTH_SECRET_KEY=${{ secrets.AUTH_SECRET_KEY }}
            EOF

            docker compose pull
            docker compose up -d
            docker image prune -f
